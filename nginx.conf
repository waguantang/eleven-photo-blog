# Kessoku Blog Nginx Configuration
# Place at: /etc/nginx/conf.d/blog.conf or nginx/conf/conf.d/blog.conf

server {
    listen 80;
    server_name localhost;  # Change to your domain

    # Frontend static files (after build: npm run build -> dist/)
    root /path/to/blog/blog-frontend/dist;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    # API proxy to Spring Boot backend
    location /api/ {
        proxy_pass http://localhost:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CORS headers (handled by Spring Boot, but Nginx can add if needed)
        add_header Access-Control-Allow-Origin * always;
    }

    # Vue SPA fallback - all non-file requests go to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static asset caching
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
